name: Build Universal IPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Universal Package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 rsync unzip wget zlib1g-dev file

      - name: Download and extract SDK (x86-64 24.10)
        run: |
          wget -nv -O sdk.tar.zst https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mkdir sdk
          tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1

      - name: Prepare package sources
        run: |
          chmod +x scripts/prepare-package.sh
          ./scripts/prepare-package.sh
          rm -rf sdk/package/luci-theme-design
          mkdir -p sdk/package/luci-theme-design
          rsync -a --exclude '.git' --exclude 'sdk' ./ sdk/package/luci-theme-design/

      - name: Build package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          printf '%s\n' 'CONFIG_PACKAGE_luci-theme-design=y' >> .config
          make defconfig
          make package/luci-theme-design/compile V=s -j"$(nproc)"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find sdk/bin/packages -name 'luci-theme-design*.ipk' -exec cp {} dist/luci-theme-design_universal_all.ipk \;
          ls -lah dist

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
          tag_name: ${{ github.ref_name }}-${{ github.run_id }}
          name: Build ${{ github.ref_name }} (Run ${{ github.run_id }})
          body: |
            Automated build for LuCI 24.10 compatible Design Theme.
            Architecture: Universal (all)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
