name: Build IPK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_id: x86-64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - target_id: mediatek-filogic
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/mediatek/filogic/openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - target_id: ipq40xx-generic
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/ipq40xx/generic/openwrt-sdk-24.10.0-ipq40xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst
          - target_id: ath79-generic
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/ath79/generic/openwrt-sdk-24.10.0-ath79-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 rsync unzip wget zlib1g-dev file

      - name: Download and extract SDK
        run: |
          wget -nv -O sdk.tar.zst "${{ matrix.sdk_url }}"
          mkdir sdk
          tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1

      - name: Prepare package sources
        run: |
          ./scripts/prepare-package.sh
          rm -rf sdk/package/luci-theme-design
          mkdir -p sdk/package/luci-theme-design
          rsync -a \
            --exclude '.git' \
            --exclude 'sdk' \
            --exclude 'dist' \
            --exclude 'release-dist' \
            ./ sdk/package/luci-theme-design/

      - name: Build package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          printf '%s\n' 'CONFIG_PACKAGE_luci-theme-design=y' >> .config
          make defconfig
          make package/luci-theme-design/compile V=s -j"$(nproc)"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find sdk/bin/packages -name 'luci-theme-design*.ipk' -exec cp {} dist/ \;
          find sdk/bin/packages -name 'Packages*' -exec cp {} dist/ \; || true
          ls -lah dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-theme-design-${{ matrix.target_id }}
          path: dist/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-dist/**/*
